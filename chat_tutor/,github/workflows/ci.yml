name: Continuous Integration

on:
  push:
    branches:
      - main
      - master
      - develop

  pull_request:
    branches:
      - main
      - master
      - develop

jobs:

  test:

    runs-on: ubuntu-latest

    services:

      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: chat_tutor
        ports:
          - 5432:5432

        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379

    env:

      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/chat_tutor

      REDIS_URL: redis://localhost:6379

      JWT_SECRET: github_actions_secret

      OPENAI_API_KEY: fake-key-for-testing

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5

        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Install Testing Packages
        run: |
          pip install pytest pytest-asyncio httpx

      - name: Run Tests
        run: |
          pytest -v

      - name: Upload Test Report
        uses: actions/upload-artifact@v4

        if: always()

        with:
          name: pytest-report
          path: .