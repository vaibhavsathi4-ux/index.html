name: Code Quality

on:

  push:

  pull_request:

jobs:

  lint:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5

        with:
          python-version: "3.11"

      - name: Install Dependencies

        run: |

          python -m pip install --upgrade pip

          pip install black

          pip install isort

          pip install flake8

          pip install mypy

      - name: Black Formatting

        run: |

          black --check .

      - name: Import Sorting

        run: |

          isort --check-only .

      - name: Flake8

        run: |

          flake8 app tests

      - name: MyPy

        run: |

          mypy app