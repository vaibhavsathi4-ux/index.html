name: Docker Deploy

on:

  workflow_dispatch:

  push:

    branches:
      - main

jobs:

  docker:

    runs-on: ubuntu-latest

    permissions:

      contents: read

      packages: write

    steps:

      - name: Checkout

        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry

        uses: docker/login-action@v3

        with:

          registry: ghcr.io

          username: ${{ github.actor }}

          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker Image

        run: |

          docker build -t ghcr.io/${{ github.repository }}/chat_tutor:latest .

      - name: Push Docker Image

        run: |

          docker push ghcr.io/${{ github.repository }}/chat_tutor:latest